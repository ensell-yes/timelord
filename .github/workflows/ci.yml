name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_LOG: "error"

jobs:
  check:
    name: Check, lint, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timelord
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: timelord_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "wget -qO- http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run migrations
        env:
          PGPASSWORD: test_password
        run: |
          for f in $(find crates -name '*.sql' -path '*/migrations/*' | sort); do
            echo "Running $f"
            psql -h localhost -U timelord -d timelord_test -f "$f"
          done

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://timelord:test_password@localhost:5432/timelord_test
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222
          SQLX_OFFLINE: "false"
        run: cargo test --workspace -- --ignored
