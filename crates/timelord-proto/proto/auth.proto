syntax = "proto3";
package timelord.auth;

service AuthService {
  // Validate an access token and return claims (optional introspection, not hot-path).
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserOrgs(GetUserOrgsRequest) returns (GetUserOrgsResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string org_id = 3;
  string role = 4;
  string jti = 5;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string avatar_url = 4;
  string provider = 5;
}

message GetUserOrgsRequest {
  string user_id = 1;
}

message GetUserOrgsResponse {
  repeated OrgMembership memberships = 1;
}

message OrgMembership {
  string org_id = 1;
  string org_name = 2;
  string slug = 3;
  string role = 4;
}
